<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <!-- Font preloads — critical rendering path
       virens.io lead: Cooper Hewitt (headings) -->
  <link rel="preload" href="{{ '/assets/fonts/CooperHewitt-Bold.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="{{ '/assets/fonts/LibreBaskerville-Regular.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="{{ '/assets/fonts/JetBrainsMono-Regular.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/virens-base.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/virens-dark-theme.css' | relative_url }}">

  <!-- SEO -->
  {% seo %}

  <!-- Feed -->
  {% feed_meta %}
</head>

<body data-site="{{ site.site_type }}" data-page-type="{{ page.page_type | default: 'content' }}"{% if page.squoosh_threshold %} data-squoosh-threshold="{{ page.squoosh_threshold }}"{% endif %}>
  <div class="page-wrapper">
    <a href="#main" class="skip-link">Skip to main content</a>

    {% include header.html %}
    {% include navigation.html %}

    <!-- Divider: header → content -->
    <div class="divider-full-bleed divider-header">
      <div class="threshold-strip" data-animation="pixelate" data-src="random"><canvas></canvas></div>
    </div>

    <!-- MAIN CONTENT — single-column, no sidebar -->
    <main id="main"{% if page.aria_label %} aria-labelledby="{{ page.aria_label }}"{% endif %}>
      {{ content }}
    </main>

    <!-- Divider: content → footer -->
    <div class="divider-full-bleed divider-footer">
      <div class="threshold-strip" data-animation="pixelate" data-src="random"><canvas></canvas></div>
    </div>

    {% include footer.html %}
  </div>

  <!-- Scripts -->
  <script src="{{ '/assets/js/virens.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/threshold-split-multimode.js' | relative_url }}"></script>
</body>
</html>
