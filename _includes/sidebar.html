<!-- Five-layer animated composite strip -->
<div class="threshold-strip"
     data-animation="layers"
     data-speed="slow"
     data-kit-path="assets/img/layer-kits/"
     data-kit-count="10">
  <canvas></canvas>
</div>

<div class="sidebar-section github-widget">
  <h3>Recent Development</h3>
  <ul id="github-activity" class="github-activity">
    <li>Loading recent commits...</li>
  </ul>
  <p style="font-size: 0.875rem; margin-top: 12px;">
    <a href="https://github.com/{{ site.github.repository }}" target="_blank" rel="noopener noreferrer">
      View on GitHub →
    </a>
  </p>
</div>

<div class="tagline-box">
  <p id="tagline-text"></p>
  <img src="/assets/img/bug-me.png" alt="small ME logo">
</div>
