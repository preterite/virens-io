<nav class="site-nav">
  <div class="nav-container">
    <button class="hamburger" aria-label="Toggle navigation menu" aria-expanded="false">&#9776;</button>
    <ul class="nav-list">
      {% for item in site.navigation.main %}
      <li class="nav-item{% if item.url == "/" %}{% if page.url == "/" %} active{% endif %}{% elsif page.url == item.url %} active{% endif %}">
        <a href="{{ item.url | relative_url }}"{% if item.external %} target="_blank" rel="noopener noreferrer"{% endif %}>{{ item.title }}</a>
      </li>
      {% endfor %}

      <li class="nav-separator" aria-hidden="true"></li>

      {% for item in site.navigation.crosslinks %}
      <li class="nav-item nav-crosslink">
        <a href="{{ item.url }}"{% if item.external %} target="_blank" rel="noopener noreferrer"{% endif %}>{{ item.title }}</a>
      </li>
      {% endfor %}
    </ul>
  </div>
</nav>
